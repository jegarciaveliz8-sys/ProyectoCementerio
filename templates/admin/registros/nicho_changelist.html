{% extends "admin/change_list.html" %}
{% block object-tools-items %}
    <li>
        <form action="import-csv/" method="POST" enctype="multipart/form-data" style="display:inline;">
            {% csrf_token %}
            <input type="file" name="csv_file" accept=".csv" style="display:none;" id="csv_input" onchange="this.form.submit()">
            <a href="#" class="addlink" onclick="document.getElementById('csv_input').click(); return false;">
                🚀 CARGA MASIVA (CSV)
            </a>
        </form>
    </li>
    {{ block.super }}
{% endblock %}
