<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SISTEMA G.I.S. SANARATE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { height: 100%; margin: 0; background: #000; }
        
        /* RADAR ACTIVO */
        .radar-pulse {
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 rgba(255, 255, 255, 0.7);
            animation: pulse-animation 1.5s infinite;
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Iniciar mapa
        var map = L.map('map').setView([14.7821, -90.2049], 18);

        // 2. FORZAR CAPA SATÉLITE GOOGLE (Híbrida)
        var googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 22,
            subdomains:['mt0','mt1','mt2','mt3'],
            attribution: 'Municipalidad de Sanarate'
        }).addTo(map);

        // 3. Dibujar tus puntos
        var markers = [];
        {% for n in nichos %}
            {% if n.lat and n.lng %}
                // Forzamos que la latitud y longitud usen punto decimal
                var lat = parseFloat("{{ n.lat }}".replace(',', '.'));
                var lng = parseFloat("{{ n.lng }}".replace(',', '.'));
                
                var color = "{{ n.monto_arbitrio }}" > 0 ? "#22c55e" : "#ef4444";
                
                var m = L.circleMarker([lat, lng], {
                    radius: 12,
                    fillColor: color,
                    color: "white",
                    weight: 2,
                    fillOpacity: 1,
                    className: 'radar-pulse'
                }).addTo(map);

                m.bindPopup(`
                    <div style="text-align:center;">
                        <h3 style="margin:0;">Nicho: {{ n.codigo }}</h3>
                        <p><b>Difunto:</b> {{ n.nombre_difunto|default:"Dato Guardado" }}</p>
                        <p><b>Estado:</b> ${color == "#22c55e" ? "SOLVENTE" : "MORA"}</p>
                        {% if n.qr_code %}
                            <img src="{{ n.qr_code.url }}" width="100">
                        {% endif %}
                    </div>
                `);
                markers.push([lat, lng]);
            {% endif %}
        {% endfor %}

        // 4. Zoom automático a los puntos reales
        if (markers.length > 0) {
            map.fitBounds(L.latLngBounds(markers), {padding: [50, 50]});
        }
        
        // Refresco de seguridad para el gris
        setTimeout(function(){ map.invalidateSize(); }, 500);
    </script>
</body>
</html>
