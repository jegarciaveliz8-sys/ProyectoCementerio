<!DOCTYPE html>
<html lang="es">
<head>
    <title>S.I.T. SANARATE | GLOBAL RADAR PRO</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root { --primary: #00ff88; --danger: #ff4444; --dark: #0a0f18; }
        body { margin: 0; padding: 0; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }

        /* Panel HUD Estilo Militar */
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(10, 15, 24, 0.9); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 12px; width: 320px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); border: 1px solid rgba(0, 255, 136, 0.3);
            color: white;
        }
        .brand { font-weight: 900; font-size: 20px; text-align: center; margin-bottom: 15px; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: rgba(0, 255, 136, 0.05); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid rgba(0, 255, 136, 0.1); }
        .stat-val { display: block; font-size: 22px; font-weight: 900; color: var(--primary); }
        .stat-lbl { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        
        #buscador { width: 100%; background: #000; border: 1px solid var(--primary); padding: 14px; border-radius: 8px; color: var(--primary); outline: none; font-family: monospace; }
        #buscador::placeholder { color: rgba(0, 255, 136, 0.4); }

        /* --- EL RADAR: Animación de Pulso Electromagnético --- */
        .leaflet-interactive {
            transition: all 0.3s;
        }

        /* Pulso para puntos normales (Verde) */
        .radar-pulse {
            stroke-width: 10;
            stroke: var(--primary);
            stroke-opacity: 0.6;
            animation: pulse-green 2s infinite linear;
        }
        @keyframes pulse-green {
            0% { stroke-width: 2; stroke-opacity: 0.8; }
            100% { stroke-width: 25; stroke-opacity: 0; }
        }

        /* Pulso para puntos en MORA (Rojo) */
        .radar-pulse-mora {
            stroke-width: 10;
            stroke: var(--danger);
            stroke-opacity: 0.6;
            animation: pulse-red 1.5s infinite linear;
        }
        @keyframes pulse-red {
            0% { stroke-width: 2; stroke-opacity: 0.8; }
            100% { stroke-width: 30; stroke-opacity: 0; }
        }

        /* Popups Estilo Sci-Fi */
        .leaflet-popup-content-wrapper { background: var(--dark); color: white; border-radius: 8px; border: 1px solid var(--primary); }
        .pop-head { background: var(--primary); color: black; padding: 10px; font-weight: 900; text-align: center; margin: -14px -20px 10px -20px; }
        .btn-edit { display: block; text-align: center; background: var(--primary); color: black; padding: 10px; border-radius: 4px; text-decoration: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="hud">
        <div class="brand"><i class="fas fa-crosshairs"></i> G.I.S. RADAR</div>
        <div class="stats">
            <div class="stat-card"><span class="stat-val" id="t1">0</span><span class="stat-lbl">ACTIVOS</span></div>
            <div class="stat-card"><span class="stat-val" id="t2" style="color:var(--danger)">0</span><span class="stat-lbl">MOROSOS</span></div>
        </div>
        <input type="text" id="buscador" placeholder="> ESCANEAR NOMBRE/ID...">
        <a href="/admin/" style="display:block; text-align:center; color:#555; font-size:10px; margin-top:15px; text-decoration:none; letter-spacing:2px;">ACCESO AL NÚCLEO</a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script>
        var map = L.map('map', { zoomControl: false }).setView([14.782, -90.192], 18);
        
        // Capa Satelital Pro
        L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 22, subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
        }).addTo(map);

        var markers = L.markerClusterGroup({ 
            maxClusterRadius: 30,
            showCoverageOnHover: false,
            spiderfyOnMaxZoom: true
        });

        var dataMaster = [];

        fetch(window.location.origin + '/api/datos/')
            .then(res => res.json())
            .then(data => {
                dataMaster = data;
                document.getElementById('t1').innerText = data.length;
                document.getElementById('t2').innerText = data.filter(n => n.monto_arbitrio <= 0 && n.nombre_difunto).length;

                data.forEach(n => {
                    if(n.lat && n.lng) {
                        var isMora = (n.monto_arbitrio <= 0 && n.nombre_difunto);
                        var pulseStyle = isMora ? 'radar-pulse-mora' : 'radar-pulse';
                        var colorNicho = isMora ? '#ff4444' : '#00ff88';

                        var m = L.circleMarker([n.lat, n.lng], {
                            radius: 6,
                            fillColor: colorNicho,
                            color: colorNicho,
                            weight: 2,
                            fillOpacity: 1,
                            className: pulseStyle // Inyección de la animación
                        }).bindPopup(`
                            <div class="pop-head">SCAN: ${n.codigo}</div>
                            <div style="padding:10px;">
                                <b>DIFUNTO:</b><br>${n.nombre_difunto || 'RESERVA/DISP'}<br><br>
                                <b>ESTADO:</b> Q${n.monto_arbitrio}<br>
                                <a href="/admin/registros/nicho/${n.id}/change/" class="btn-edit">MODIFICAR</a>
                            </div>
                        `);
                        n.m = m;
                        markers.addLayer(m);
                    }
                });
                map.addLayer(markers);
            });

        document.getElementById('buscador').addEventListener('input', function(e){
            var v = e.target.value.toLowerCase();
            if(v.length < 3) return;
            var f = dataMaster.find(n => n.codigo.toLowerCase().includes(v) || (n.nombre_difunto && n.nombre_difunto.toLowerCase().includes(v)));
            if(f && f.lat) {
                map.flyTo([f.lat, f.lng], 20, { duration: 1.5 });
                setTimeout(() => { markers.zoomToShowLayer(f.m, () => f.m.openPopup()); }, 1600);
            }
        });
    </script>
</body>
</html>
