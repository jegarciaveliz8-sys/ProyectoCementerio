<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>G.I.S. MUNICIPALIDAD SANARATE | CONTROL TOTAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { height: 100%; margin: 0; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }

        /* BUSCADOR BLINDADO */
        #search-box {
            position: absolute; top: 20px; left: 50px; z-index: 1000;
            background: rgba(15, 23, 42, 0.95); padding: 15px; border-radius: 12px;
            border: 2px solid #3b82f6; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex; gap: 10px; align-items: center;
        }
        #search-box input {
            background: #1e293b; border: 1px solid #334155; color: #fff;
            padding: 10px; border-radius: 6px; outline: none; width: 180px; font-weight: bold;
        }
        #search-box button {
            background: #2563eb; color: white; border: none; padding: 10px 18px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        #search-box button:hover { background: #1d4ed8; transform: scale(1.05); }

        /* RADAR BLINDADO (Puntos LED) */
        .radar-dot {
            width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: blink-shield 1.5s infinite ease-in-out;
        }

        @keyframes blink-shield {
            0% { transform: scale(0.8); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 20px rgba(255,255,255,1); }
            100% { transform: scale(0.8); opacity: 0.6; }
        }

        /* POPUP ESTILO FICHA MUNICIPAL */
        .nicho-popup { text-align: center; min-width: 180px; }
        .nicho-popup h3 { margin: 0 0 10px 0; color: #2563eb; border-bottom: 2px solid #3b82f6; padding-bottom: 5px; }
        .nicho-popup img { width: 130px; height: 130px; object-fit: contain; margin: 10px 0; border: 1px solid #ccc; background: #fff; padding: 5px; border-radius: 4px; }
        .status-tag { display: inline-block; padding: 4px 10px; border-radius: 20px; color: white; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="target-nicho" placeholder="CODIGO (A1-5-036)" onkeypress="if(event.key==='Enter') buscar()">
        <button onclick="buscar()">🛰️ LOCALIZAR</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { zoomControl: false }).setView([14.7821, -90.2049], 19);
        
        // Capa Satélite Híbrida Blindada
        L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'],
            attribution: 'G.I.S. Sanarate'
        }).addTo(map);

        var markers = {};
        var puntosZoom = [];

        {% for n in nichos %}
            {% if n.lat and n.lng %}
            try {
                (function() {
                    var lat = parseFloat("{{ n.lat }}".replace(',', '.'));
                    var lng = parseFloat("{{ n.lng }}".replace(',', '.'));
                    var cod = "{{ n.codigo }}".trim().toUpperCase();
                    var solvente = {% if n.monto_arbitrio > 0 %}true{% else %}false{% endif %};
                    var colorStatus = solvente ? "#10b981" : "#ef4444";

                    var radarIcon = L.divIcon({
                        className: 'custom-icon',
                        html: '<div class="radar-dot" style="background-color: ' + colorStatus + ';"></div>',
                        iconSize: [15, 15], iconAnchor: [7, 7]
                    });

                    var m = L.marker([lat, lng], { icon: radarIcon }).addTo(map);
                    
                    var popupHtml = '<div class="nicho-popup">' +
                        '<h3>' + cod + '</h3>' +
                        '<span class="status-tag" style="background:' + colorStatus + ';">' + (solvente ? 'SOLVENTE' : 'MORA') + '</span><br>' +
                        '<b>Difunto:</b> {{ n.nombre_difunto|default:"DISPONIBLE" }}<br>' +
                        {% if n.qr_code %}
                        '<img src="{{ n.qr_code.url }}">' +
                        {% endif %}
                        '<br><a href="/admin/registros/nicho/{{ n.id }}/change/" target="_blank" style="color:#2563eb; font-weight:bold; text-decoration:none;">EDITAR FICHA</a>' +
                        '</div>';

                    m.bindPopup(popupHtml);
                    markers[cod] = m;
                    puntosZoom.push([lat, lng]);
                })();
            } catch(e) { console.error("Error en nicho {{ n.codigo }}"); }
            {% endif %}
        {% endfor %}

        function buscar() {
            var val = document.getElementById('target-nicho').value.trim().toUpperCase();
            if (markers[val]) {
                map.setView(markers[val].getLatLng(), 21);
                markers[val].openPopup();
            } else {
                alert("Nicho " + val + " no encontrado.");
            }
        }

        if (puntosZoom.length > 0) { map.fitBounds(L.latLngBounds(puntosZoom), {padding:[50,50]}); }
        setTimeout(function(){ map.invalidateSize(); }, 600);
    </script>
</body>
</html>
